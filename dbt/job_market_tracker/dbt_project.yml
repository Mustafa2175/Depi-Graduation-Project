name: 'job_market_tracker'
version: '1.0.0'
config-version: 2

# Connects to the 'job_market_tracker' profile in profiles.yml
profile: 'job_market_tracker'

model-paths: ["models"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Layered materialization strategy:
#   staging      -> views   (light renaming over the Phase 4 star schema)
#   intermediate -> views   (joins / denormalization)
#   marts        -> tables  (analytics-ready, served to the API in Phase 9)
models:
  job_market_tracker:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

snapshots:
  job_market_tracker:
    +target_schema: snapshots
